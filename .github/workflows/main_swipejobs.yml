# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy

name: Build and deploy ASP.Net Core app to Azure Web App - swipejobs

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: swipejobs

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API for Azure Windows
        run: |
          dotnet publish server/src/SwipeJobs.Api/SwipeJobs.Api.csproj -c Release -r win-x64 --self-contained true -o "$env:RUNNER_TEMP/publish"
          Write-Host "=== Publish audit ==="
          $pub = "$env:RUNNER_TEMP/publish"
          @("SwipeJobs.Api.exe", "SwipeJobs.Api.dll", "hostfxr.dll", "web.config", "appsettings.Production.json") | ForEach-Object {
            $p = Join-Path $pub $_
            if (Test-Path $p) { Write-Host "OK $_ ($((Get-Item $p).Length) bytes)" } else { Write-Host "MISSING $_"; exit 1 }
          }
          Write-Host "Total files:" (Get-ChildItem $pub -Recurse -File).Count
          Select-String -Path (Join-Path $pub "web.config") -Pattern "stdoutLogEnabled|hostingModel|processPath"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ runner.temp }}/publish

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_576290AC42DC4A16BF27E92F9C0E1637 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C86F95965C204C3F89FDFA40C1A41A8B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1B53392385324F709311D27CB9A0DCD6 }}

      - name: Configure Azure application settings
        shell: bash
        env:
          DB_CONNECTION: ${{ secrets.AZURE_DB_CONNECTION_STRING }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          set -euo pipefail

          APP_NAME="${{ env.AZURE_WEBAPP_NAME }}"

          if [ -z "${DB_CONNECTION:-}" ]; then
            echo "::error::GitHub secret AZURE_DB_CONNECTION_STRING is not set."
            exit 1
          fi

          retry_az() {
            local description="$1"
            shift
            local attempt max=6 delay=10
            for attempt in $(seq 1 "$max"); do
              echo "[$attempt/$max] $description"
              if output=$("$@" 2>&1); then
                if [ -n "$output" ]; then
                  echo "$output"
                fi
                return 0
              fi
              code=$?
              echo "$output"
              if echo "$output" | grep -qiE 'Conflict|409|Another operation|in progress'; then
                if [ "$attempt" -lt "$max" ]; then
                  echo "Transient Azure conflict — retrying in ${delay}s..."
                  sleep "$delay"
                  delay=$((delay * 2))
                  continue
                fi
              fi
              echo "::error::$description failed (exit $code)"
              echo "Running with --debug for full Azure response..."
              "$@" --debug 2>&1 || true
              return "$code"
            done
          }

          echo "Discovering web app '$APP_NAME'..."
          az webapp list \
            --query "[].{name:name, resourceGroup:resourceGroup, host:defaultHostName, state:state}" \
            -o table

          if [ -n "${AZURE_RESOURCE_GROUP:-}" ]; then
            RG="$AZURE_RESOURCE_GROUP"
            echo "Using resource group from AZURE_RESOURCE_GROUP secret: $RG"
          else
            RG=$(az webapp list --query "[?name=='$APP_NAME'] | [0].resourceGroup" -o tsv | tr -d '\r')
          fi

          if [ -z "$RG" ] || [ "$RG" = "null" ]; then
            echo "::error::Could not resolve resource group for web app '$APP_NAME'."
            echo "Set GitHub secret AZURE_RESOURCE_GROUP to your App Service resource group name."
            exit 1
          fi

          HOST=$(az webapp show --resource-group "$RG" --name "$APP_NAME" --query defaultHostName -o tsv | tr -d '\r')
          STATE=$(az webapp show --resource-group "$RG" --name "$APP_NAME" --query state -o tsv | tr -d '\r')
          echo "Target: app=$APP_NAME rg=$RG host=$HOST state=$STATE"

          USE_32=$(az webapp show --resource-group "$RG" --name "$APP_NAME" --query siteConfig.use32BitWorkerProcess -o tsv | tr -d '\r')
          echo "Current use32BitWorkerProcess=$USE_32"

          retry_az "Enable 64-bit IIS worker (fixes HTTP 500.32 ANCM)" \
            az webapp config set \
              --resource-group "$RG" \
              --name "$APP_NAME" \
              --use-32bit-worker-process false

          USE_32_AFTER=$(az webapp show --resource-group "$RG" --name "$APP_NAME" --query siteConfig.use32BitWorkerProcess -o tsv | tr -d '\r')
          echo "After config use32BitWorkerProcess=$USE_32_AFTER"
          sleep 5

          echo "Existing app settings (names only):"
          az webapp config appsettings list \
            --resource-group "$RG" \
            --name "$APP_NAME" \
            --query "[].name" \
            -o tsv | sort

          # Azure treats app setting names as case-insensitive; mismatched casing causes 409 Conflict.
          TARGET_KEYS=("ASPNETCORE_ENVIRONMENT" "ConnectionStrings__DefaultConnection")
          EXISTING_JSON=$(az webapp config appsettings list --resource-group "$RG" --name "$APP_NAME" -o json)

          CONFLICT_KEYS=""
          for target_key in "${TARGET_KEYS[@]}"; do
            target_lower=$(echo "$target_key" | tr '[:upper:]' '[:lower:]')
            keys=$(echo "$EXISTING_JSON" | jq -r --arg tl "$target_lower" --arg tk "$target_key" \
              '.[] | select((.name | ascii_downcase) == $tl and .name != $tk) | .name')
            CONFLICT_KEYS="$CONFLICT_KEYS $keys"
          done

          for old_key in $CONFLICT_KEYS; do
            if [ -n "$old_key" ]; then
              echo "Removing case-conflicting setting: $old_key"
              retry_az "Delete conflicting app setting $old_key" \
                az webapp config appsettings delete \
                  --resource-group "$RG" \
                  --name "$APP_NAME" \
                  --setting-names "$old_key"
            fi
          done

          JWT_KEY="${JWT_KEY:-SwipeJobs-Azure-Production-Change-Me-32Chars!}"

          echo "Applying app settings (values redacted in Azure CLI output):"
          retry_az "Set app settings" \
            az webapp config appsettings set \
              --resource-group "$RG" \
              --name "$APP_NAME" \
              --settings \
                "ASPNETCORE_ENVIRONMENT=Production" \
                "ConnectionStrings__DefaultConnection=$DB_CONNECTION" \
                "Jwt__Key=$JWT_KEY"

          retry_az "Set connection string (CUSTOMCONNSTR fallback)" \
            az webapp config connection-string set \
              --resource-group "$RG" \
              --name "$APP_NAME" \
              --connection-string-type Custom \
              --settings "DefaultConnection=$DB_CONNECTION"

          CONN_LEN=$(az webapp config appsettings list \
            --resource-group "$RG" \
            --name "$APP_NAME" \
            --query "[?name=='ConnectionStrings__DefaultConnection'].value | [0]" -o tsv | wc -c | tr -d ' ')
          echo "ConnectionStrings__DefaultConnection length: $CONN_LEN"
          if [ "${CONN_LEN:-0}" -lt 30 ]; then
            echo "::error::ConnectionStrings__DefaultConnection was not persisted on Azure (length $CONN_LEN)."
            az webapp config appsettings list --resource-group "$RG" --name "$APP_NAME" --query "[].name" -o tsv
            exit 1
          fi

          echo "Verified app settings present:"
          az webapp config appsettings list \
            --resource-group "$RG" \
            --name "$APP_NAME" \
            --query "[?name=='ASPNETCORE_ENVIRONMENT' || name=='ConnectionStrings__DefaultConnection'].name" \
            -o tsv

          echo "=== App Service platform / runtime ==="
          az webapp show --resource-group "$RG" --name "$APP_NAME" --query "{
            kind:kind,
            state:state,
            use32BitWorkerProcess:siteConfig.use32BitWorkerProcess,
            netFrameworkVersion:siteConfig.netFrameworkVersion,
            windowsFxVersion:siteConfig.windowsFxVersion,
            linuxFxVersion:siteConfig.linuxFxVersion,
            appCommandLine:siteConfig.appCommandLine,
            alwaysOn:siteConfig.alwaysOn
          }" -o json

          az webapp config appsettings list --resource-group "$RG" --name "$APP_NAME" --query "[].name" -o tsv | sort

          echo "$RG" > azure_rg.txt
          echo "$HOST" > azure_host.txt

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./publish

      - name: Restart Azure Web App
        shell: bash
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          set -euo pipefail
          APP_NAME="${{ env.AZURE_WEBAPP_NAME }}"
          if [ -n "${AZURE_RESOURCE_GROUP:-}" ]; then
            RG="$AZURE_RESOURCE_GROUP"
          else
            RG=$(az webapp list --query "[?name=='$APP_NAME'] | [0].resourceGroup" -o tsv | tr -d '\r')
          fi
          echo "Restarting $APP_NAME in $RG..."
          az webapp restart --resource-group "$RG" --name "$APP_NAME"
          sleep 20

      - name: Diagnose Azure ANCM startup
        if: always()
        shell: bash
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          {
          set -uo pipefail
          APP_NAME="${{ env.AZURE_WEBAPP_NAME }}"
          BASE="https://swipejobs-afexcuape8ecexdk.eastasia-01.azurewebsites.net"

          if [ -f azure_rg.txt ]; then
            RG=$(tr -d '\r' < azure_rg.txt)
          elif [ -n "${AZURE_RESOURCE_GROUP:-}" ]; then
            RG="$AZURE_RESOURCE_GROUP"
          else
            RG=$(az webapp list --query "[?name=='$APP_NAME'] | [0].resourceGroup" -o tsv | tr -d '\r')
          fi

          if [ -f azure_host.txt ]; then
            HOST=$(tr -d '\r' < azure_host.txt)
          else
            HOST=$(az webapp show --resource-group "$RG" --name "$APP_NAME" --query defaultHostName -o tsv | tr -d '\r')
          fi

          SCM_HOST="${HOST/.eastasia-01.azurewebsites.net/.scm.eastasia-01.azurewebsites.net}"
          echo "Diagnosing app=$APP_NAME rg=$RG host=$HOST scm=$SCM_HOST"

          az webapp log config \
            --resource-group "$RG" \
            --name "$APP_NAME" \
            --application-logging filesystem \
            --level information \
            --web-server-logging filesystem \
            --detailed-error-messages true \
            --failed-request-tracing true \
            --output none || true

          echo "Triggering startup via health request..."
          curl -sS -o /tmp/trigger.html -w "health HTTP:%{http_code}\n" "$BASE/api/health" || true
          sleep 20

          CREDS=$(az webapp deployment list-publishing-credentials --resource-group "$RG" --name "$APP_NAME" -o json)
          USER=$(echo "$CREDS" | jq -r .publishingUserName)
          PASS=$(echo "$CREDS" | jq -r .publishingPassword)

          echo "=== Kudu LogFiles listing ==="
          curl -sS -u "$USER:$PASS" "https://$SCM_HOST/api/vfs/LogFiles/" | jq -r '.[].name' 2>/dev/null || \
            curl -sS -u "$USER:$PASS" "https://$SCM_HOST/api/vfs/LogFiles/"

          echo "=== Kudu recent application logs ==="
          curl -sS -u "$USER:$PASS" "https://$SCM_HOST/api/logs/recent?top=100" | jq -r '.[] | "\(.time) [\(.level)] \(.message)"' 2>/dev/null || \
            curl -sS -u "$USER:$PASS" "https://$SCM_HOST/api/logs/recent?top=100"

          echo "=== stdout log files ==="
          STDOUT_FILES=$(curl -sS -u "$USER:$PASS" "https://$SCM_HOST/api/vfs/LogFiles/" | jq -r '.[].name' | grep -i stdout || true)
          for f in $STDOUT_FILES; do
            echo "--- $f ---"
            curl -sS -u "$USER:$PASS" "https://$SCM_HOST/api/vfs/LogFiles/$f/" | jq -r '.[].name' 2>/dev/null | tail -n 3 | while read -r logfile; do
              echo ">>> LogFiles/$f/$logfile"
              curl -sS -u "$USER:$PASS" "https://$SCM_HOST/api/vfs/LogFiles/$f/$logfile" | tail -c 12000
            done
          done

          echo "=== Kudu: run SwipeJobs.Api.exe with Azure app settings ==="
          AZ_CONN=$(az webapp config appsettings list --resource-group "$RG" --name "$APP_NAME" --query "[?name=='ConnectionStrings__DefaultConnection'].value | [0]" -o tsv | tr -d '\r')
          AZ_JWT=$(az webapp config appsettings list --resource-group "$RG" --name "$APP_NAME" --query "[?name=='Jwt__Key'].value | [0]" -o tsv | tr -d '\r')
          echo "Azure ConnectionStrings__DefaultConnection length: ${#AZ_CONN}"
          echo "Azure Jwt__Key length: ${#AZ_JWT}"
          export AZ_CONN AZ_JWT
          KUDU_PAYLOAD=$(python -c "import json, os; cmd='set ConnectionStrings__DefaultConnection=' + os.environ['AZ_CONN'] + '&& set Jwt__Key=' + os.environ.get('AZ_JWT','') + '&& set ASPNETCORE_ENVIRONMENT=Production&& D:\\\\home\\\\site\\\\wwwroot\\\\SwipeJobs.Api.exe'; print(json.dumps({'command': cmd, 'dir': 'D:\\\\home\\\\site\\\\wwwroot'}))")
          KUDU_CMD=$(curl -sS -X POST "https://$SCM_HOST/api/command" \
            -u "$USER:$PASS" \
            -H "Content-Type: application/json" \
            -d "$KUDU_PAYLOAD" || true)
          echo "$KUDU_CMD" | jq -r '.Output, .Error, .ExitCode' 2>/dev/null || echo "$KUDU_CMD"

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            echo "## Azure ANCM diagnose" >> "$GITHUB_STEP_SUMMARY"
            cat azure-diagnose.log >> "$GITHUB_STEP_SUMMARY" || true
          fi

          echo "=== az webapp log download ==="
          az webapp log download --resource-group "$RG" --name "$APP_NAME" --log-file azure-logs.zip || true
          if [ -f azure-logs.zip ]; then
            unzip -l azure-logs.zip | head -n 40 || true
            unzip -p azure-logs.zip 2>/dev/null | strings | grep -iE "fail|exception|error|ANCM|SwipeJobs" | tail -n 80 || true
          fi

          echo "=== wwwroot key files ==="
          curl -sS -u "$USER:$PASS" "https://$SCM_HOST/api/vfs/site/wwwroot/" | jq -r '.[] | select(.name|test("SwipeJobs|web.config|hostfxr")) | "\(.name) \(.size)"' 2>/dev/null || true

          } 2>&1 | tee azure-diagnose.log

      - name: Upload Azure diagnose log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azure-diagnose-log
          path: azure-diagnose.log
          if-no-files-found: warn

      - name: Verify deployment
        shell: bash
        run: |
          set -euo pipefail
          BASE="https://swipejobs-afexcuape8ecexdk.eastasia-01.azurewebsites.net"
          ORIGIN="https://swipejobss.netlify.app"

          for attempt in $(seq 1 12); do
            echo "--- verify attempt $attempt ---"
            HEALTH_CODE=$(curl -sS -o /tmp/health.json -w "%{http_code}" "$BASE/api/health" || true)
            echo "GET /api/health -> $HEALTH_CODE"
            if [ "$HEALTH_CODE" = "200" ]; then
              cat /tmp/health.json
              break
            fi
            sleep 15
          done

          if [ "$HEALTH_CODE" != "200" ]; then
            echo "::error::Health check did not return 200 (last code: $HEALTH_CODE)"
            exit 1
          fi

          CORS_HEADERS=$(curl -sS -D - -o /dev/null -X OPTIONS "$BASE/api/auth/login" \
            -H "Origin: $ORIGIN" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: content-type" || true)
          echo "$CORS_HEADERS"
          echo "$CORS_HEADERS" | grep -qi "access-control-allow-origin: $ORIGIN" || {
            echo "::warning::CORS preflight missing Access-Control-Allow-Origin for $ORIGIN"
          }

          LOGIN_CODE=$(curl -sS -o /tmp/login.json -w "%{http_code}" -X POST "$BASE/api/auth/login" \
            -H "Origin: $ORIGIN" \
            -H "Content-Type: application/json" \
            -d '{"email":"test@test.com","password":"Test1234!"}' || true)
          echo "POST /api/auth/login -> $LOGIN_CODE (401/400 expected for bad credentials; not 500)"
          if [ "$LOGIN_CODE" = "500" ]; then
            echo "::error::Login endpoint returned 500"
            cat /tmp/login.json || true
            exit 1
          fi
