# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy

name: Build and deploy ASP.Net Core app to Azure Web App - swipejobs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API for Azure Windows
        run: dotnet publish server/src/SwipeJobs.Api/SwipeJobs.Api.csproj -c Release -r win-x64 --self-contained true -o "$env:RUNNER_TEMP/publish"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ runner.temp }}/publish

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_576290AC42DC4A16BF27E92F9C0E1637 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C86F95965C204C3F89FDFA40C1A41A8B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1B53392385324F709311D27CB9A0DCD6 }}

      - name: Configure Azure application settings
        shell: bash
        env:
          DB_CONNECTION: ${{ secrets.AZURE_DB_CONNECTION_STRING }}
        run: |
          RG=$(az webapp list --query "[?name=='swipejobs'].resourceGroup | [0]" -o tsv)
          echo "Configuring app settings for resource group: $RG"
          az webapp config appsettings set \
            --resource-group "$RG" \
            --name swipejobs \
            --settings \
              ASPNETCORE_ENVIRONMENT=Production \
              ConnectionStrings__DefaultConnection="$DB_CONNECTION"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'swipejobs'
          slot-name: 'Production'
          package: ./publish
